# Project identification
sonar.projectKey=api-health-checker
sonar.projectName=API Health Checker
sonar.projectVersion=1.0

# Source and test structure
sonar.sources=app
sonar.tests=tests

# Python settings
sonar.language=py
sonar.sourceEncoding=UTF-8
sonar.python.version=3.11

# Coverage report
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions (cleaner analysis)
sonar.exclusions=**/__pycache__/**,**/venv/**,**/.pytest_cache/**,**/node_modules/**