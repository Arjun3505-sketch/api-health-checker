<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Health Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #080b12;
            --bg2: #0e1320;
            --bg3: #141927;
            --bg4: #1c2333;
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text: #e8eaf0;
            --text-muted: #5a6380;
            --text-dim: #3a4260;
            --accent: #00e5ff;
            --accent-dim: rgba(0, 229, 255, 0.08);
            --accent-glow: rgba(0, 229, 255, 0.15);
            --green: #00e676;
            --green-dim: rgba(0, 230, 118, 0.1);
            --red: #ff4d6d;
            --red-dim: rgba(255, 77, 109, 0.1);
            --amber: #ffb300;
            --amber-dim: rgba(255, 179, 0, 0.1);
            --radius: 12px;
            --radius-lg: 18px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Header ── */
        header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 2.5rem;
            border-bottom: 1px solid var(--border);
            background: rgba(8, 11, 18, 0.9);
            backdrop-filter: blur(12px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            border: 1.5px solid var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .logo-icon::after {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent);
            animation: logoPulse 2s ease-in-out infinite;
        }

        @keyframes logoPulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        .logo-text {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text);
        }

        .logo-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--green);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--green);
            animation: livePulse 1.5s ease-in-out infinite;
        }

        @keyframes livePulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .last-checked {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            color: var(--text-muted);
        }

        /* ── Main ── */
        .main {
            position: relative;
            z-index: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 2.5rem;
        }

        /* ── Stats bar ── */
        .stats-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.75rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.5rem;
            flex: 1;
            min-width: 130px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
        }

        .stat-card.online::before {
            background: var(--green);
        }

        .stat-card.offline::before {
            background: var(--red);
        }

        .stat-card.total::before {
            background: var(--accent);
        }

        .stat-card.avgms::before {
            background: var(--amber);
        }

        .stat-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.4rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }

        .stat-card.online .stat-value {
            color: var(--green);
        }

        .stat-card.offline .stat-value {
            color: var(--red);
        }

        .stat-card.total .stat-value {
            color: var(--accent);
        }

        .stat-card.avgms .stat-value {
            color: var(--amber);
        }

        /* ── Toolbar ── */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .toolbar-left {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .toolbar-right {
            display: flex;
            gap: 0.6rem;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .btn:hover {
            border-color: var(--border-hover);
            background: var(--bg3);
        }

        .btn-accent {
            background: var(--accent-dim);
            border-color: rgba(0, 229, 255, 0.25);
            color: var(--accent);
        }

        .btn-accent:hover {
            background: rgba(0, 229, 255, 0.12);
            border-color: rgba(0, 229, 255, 0.4);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        /* ── Add form ── */
        .add-form {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: none;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .add-form.open {
            display: block;
        }

        .form-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .form-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            flex: 1;
            min-width: 180px;
        }

        .form-group label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            padding: 0.6rem 0.9rem;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input::placeholder {
            color: var(--text-dim);
        }

        .form-group input:focus {
            border-color: rgba(0, 229, 255, 0.3);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.06);
        }

        .form-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-sm {
            padding: 0.5rem 1.1rem;
            border-radius: 7px;
            border: none;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-add {
            background: var(--accent);
            color: #080b12;
        }

        .btn-add:hover {
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }

        .btn-cancel {
            background: var(--bg3);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-cancel:hover {
            color: var(--text);
        }

        .form-error {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            color: var(--red);
            margin-top: 0.5rem;
            display: none;
        }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        /* ── Card ── */
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            position: relative;
            overflow: hidden;
            transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
            cursor: default;
            animation: cardIn 0.3s ease both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card.status-up {
            border-top: 2px solid var(--green);
        }

        .card.status-down {
            border-top: 2px solid var(--red);
        }

        .card.status-timeout {
            border-top: 2px solid var(--amber);
        }

        .card.status-degraded {
            border-top: 2px solid var(--amber);
        }

        .card.status-error {
            border-top: 2px solid var(--red);
        }

        /* Glow behind card based on status */
        .card.status-up::before {
            content: '';
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 60px;
            background: var(--green);
            opacity: 0.04;
            border-radius: 50%;
            filter: blur(20px);
            pointer-events: none;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.6rem;
        }

        .card-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            flex: 1;
            margin-right: 0.5rem;
        }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 3px 9px;
            border-radius: 20px;
        }

        .badge.up {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(0, 230, 118, 0.2);
        }

        .badge.down {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(255, 77, 109, 0.2);
        }

        .badge.timeout {
            background: var(--amber-dim);
            color: var(--amber);
            border: 1px solid rgba(255, 179, 0, 0.2);
        }

        .badge.degraded {
            background: var(--amber-dim);
            color: var(--amber);
            border: 1px solid rgba(255, 179, 0, 0.2);
        }

        .badge.error {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(255, 77, 109, 0.2);
        }

        .badge.checking {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .del-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 2px 5px;
            border-radius: 4px;
            transition: color 0.2s, background 0.2s;
            line-height: 1;
        }

        .del-btn:hover {
            color: var(--red);
            background: var(--red-dim);
        }

        .card-url {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-bottom: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-metrics {
            display: flex;
            gap: 1.25rem;
            margin-bottom: 1rem;
        }

        .metric {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .metric-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.58rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
        }

        .metric-value.fast {
            color: var(--green);
        }

        .metric-value.medium {
            color: var(--amber);
        }

        .metric-value.slow {
            color: var(--red);
        }

        /* Mini sparkline chart */
        .chart-wrap {
            height: 44px;
            position: relative;
        }

        /* ── Empty state ── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-muted);
        }

        .empty-icon {
            width: 56px;
            height: 56px;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            font-size: 1.5rem;
        }

        .empty-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.4rem;
        }

        .empty-sub {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 1.75rem;
            right: 1.75rem;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1.25rem;
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.25s;
            pointer-events: none;
            z-index: 999;
            max-width: 300px;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            border-color: rgba(0, 230, 118, 0.3);
            color: var(--green);
        }

        .toast.error {
            border-color: rgba(255, 77, 109, 0.3);
            color: var(--red);
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 1.5px solid var(--text-dim);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 4px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 640px) {
            header {
                padding: 1rem 1.25rem;
            }

            .main {
                padding: 1.25rem;
            }

            .stat-card {
                min-width: 100px;
                padding: 0.75rem 1rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <div class="logo-icon"></div>
            <div>
                <div class="logo-text">API Health Monitor</div>
                <div class="logo-sub">Uptime &amp; Latency Tracking</div>
            </div>
        </div>
        <div class="header-right">
            <div class="live-badge">
                <span class="live-dot"></span>
                Live
            </div>
            <span class="last-checked" id="last-checked">Initializing...</span>
        </div>
    </header>

    <div class="main">

        <div class="stats-row">
            <div class="stat-card online">
                <div class="stat-label">Online</div>
                <div class="stat-value" id="count-up">—</div>
            </div>
            <div class="stat-card offline">
                <div class="stat-label">Offline</div>
                <div class="stat-value" id="count-down">—</div>
            </div>
            <div class="stat-card total">
                <div class="stat-label">Total</div>
                <div class="stat-value" id="count-total">—</div>
            </div>
            <div class="stat-card avgms">
                <div class="stat-label">Avg ms</div>
                <div class="stat-value" id="avg-ms">—</div>
            </div>
        </div>

        <div class="toolbar">
            <div class="toolbar-left" id="toolbar-status">Waiting for first check...</div>
            <div class="toolbar-right">
                <button class="btn" onclick="fetchStatus()">
                    <span id="refresh-icon">↻</span> Refresh
                </button>
                <button class="btn btn-accent" onclick="toggleForm()">
                    + Add Endpoint
                </button>
            </div>
        </div>

        <div class="add-form" id="add-form">
            <div class="form-title">// New endpoint</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Display name</label>
                    <input type="text" id="input-name" placeholder="e.g. GitHub API" autocomplete="off" />
                </div>
                <div class="form-group">
                    <label>URL</label>
                    <input type="text" id="input-url" placeholder="https://api.example.com" autocomplete="off" />
                </div>
            </div>
            <div class="form-error" id="form-error"></div>
            <div class="form-actions">
                <button class="btn-sm btn-add" onclick="submitEndpoint()">Add endpoint</button>
                <button class="btn-sm btn-cancel" onclick="toggleForm()">Cancel</button>
            </div>
        </div>

        <div class="grid" id="grid">
            <div class="empty-state">
                <div class="empty-icon">◎</div>
                <div class="empty-title">Loading endpoints...</div>
                <div class="empty-sub">Fetching status from DynamoDB</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const sparklineHistory = {};
        const chartInstances = {};

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast show ${type}`;
            setTimeout(() => { t.className = 'toast'; }, 2800);
        }

        function toggleForm() {
            const f = document.getElementById('add-form');
            f.classList.toggle('open');
            if (f.classList.contains('open')) {
                document.getElementById('input-name').focus();
                document.getElementById('form-error').style.display = 'none';
            }
        }

        async function submitEndpoint() {
            const name = document.getElementById('input-name').value.trim();
            const url = document.getElementById('input-url').value.trim();
            const err = document.getElementById('form-error');

            if (!name || !url) {
                err.textContent = '// both fields are required';
                err.style.display = 'block'; return;
            }
            if (!url.startsWith('http')) {
                err.textContent = '// url must start with http:// or https://';
                err.style.display = 'block'; return;
            }

            const res = await fetch('/endpoints', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, url })
            });

            if (res.ok) {
                document.getElementById('input-name').value = '';
                document.getElementById('input-url').value = '';
                err.style.display = 'none';
                toggleForm();
                showToast('// endpoint added successfully', 'success');
                fetchStatus();
            } else {
                const d = await res.json();
                err.textContent = '// ' + (d.error || 'something went wrong');
                err.style.display = 'block';
            }
        }

        async function deleteEndpoint(url, name) {
            if (!confirm(`Remove "${name}" from monitoring?`)) return;
            const res = await fetch('/endpoints', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });
            if (res.ok) { showToast('// endpoint removed', 'success'); fetchStatus(); }
            else showToast('// failed to remove endpoint', 'error');
        }

        function getSpeedClass(ms) {
            if (!ms) return 'slow';
            if (ms < 300) return 'fast';
            if (ms < 800) return 'medium';
            return 'slow';
        }

        function getSpeedColor(ms) {
            if (!ms) return 'rgba(255,77,109,0.7)';
            if (ms < 300) return 'rgba(0,230,118,0.7)';
            if (ms < 800) return 'rgba(255,179,0,0.7)';
            return 'rgba(255,77,109,0.7)';
        }

        function renderSparkline(canvasId, url, latestMs) {
            if (!sparklineHistory[url]) sparklineHistory[url] = [];
            if (latestMs !== null && latestMs !== undefined) {
                sparklineHistory[url].push(latestMs);
                if (sparklineHistory[url].length > 12) sparklineHistory[url].shift();
            }

            const data = sparklineHistory[url];
            if (data.length === 0) return;

            const canvas = document.getElementById(canvasId);
            if (!canvas) return;

            if (chartInstances[canvasId]) {
                chartInstances[canvasId].destroy();
            }

            const color = getSpeedColor(latestMs);

            chartInstances[canvasId] = new Chart(canvas, {
                type: 'line',
                data: {
                    labels: data.map((_, i) => i),
                    datasets: [{
                        data,
                        borderColor: color,
                        borderWidth: 1.5,
                        pointRadius: 0,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: color.replace('0.7', '0.08')
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    scales: {
                        x: { display: false },
                        y: { display: false, beginAtZero: true }
                    },
                    animation: { duration: 400 }
                }
            });
        }

        async function fetchStatus() {
            const icon = document.getElementById('refresh-icon');
            icon.innerHTML = '<span class="spinner"></span>';

            try {
                const res = await fetch('/check');
                const data = await res.json();
                icon.textContent = '↻';

                const grid = document.getElementById('grid');

                if (data.length === 0) {
                    if (chartInstances) Object.values(chartInstances).forEach(c => c.destroy());
                    grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">◎</div>
            <div class="empty-title">No endpoints yet</div>
            <div class="empty-sub">// click "+ Add Endpoint" to start monitoring</div>
          </div>`;
                    ['count-up', 'count-down', 'count-total', 'avg-ms'].forEach(id => {
                        document.getElementById(id).textContent = '0';
                    });
                    document.getElementById('toolbar-status').textContent = 'No endpoints configured';
                    document.getElementById('last-checked').textContent = '—';
                    return;
                }

                const up = data.filter(e => e.status === 'up').length;
                const down = data.length - up;
                const times = data.filter(e => e.response_time).map(e => e.response_time);
                const avg = times.length ? Math.round(times.reduce((a, b) => a + b, 0) / times.length) : 0;

                document.getElementById('count-up').textContent = up;
                document.getElementById('count-down').textContent = down;
                document.getElementById('count-total').textContent = data.length;
                document.getElementById('avg-ms').textContent = avg ? avg + '' : '—';

                const now = new Date().toLocaleTimeString();
                document.getElementById('last-checked').textContent = now;
                document.getElementById('toolbar-status').textContent =
                    `// ${data.length} endpoint${data.length !== 1 ? 's' : ''} · ${up} online · refreshed ${now}`;

                grid.innerHTML = '';

                data.forEach((ep, idx) => {
                    const canvasId = 'chart-' + btoa(ep.url).replace(/[^a-z0-9]/gi, '').slice(0, 12);
                    const card = document.createElement('div');
                    card.className = `card status-${ep.status}`;
                    card.style.animationDelay = (idx * 0.04) + 's';

                    const httpLabel = ep.status_code ? 'HTTP ' + ep.status_code : '—';
                    const msLabel = ep.response_time ? ep.response_time + ' ms' : '—';
                    const speedCls = getSpeedClass(ep.response_time);

                    card.innerHTML = `
          <div class="card-header">
            <span class="card-name">${ep.name}</span>
            <div class="card-actions">
              <span class="badge ${ep.status}">${ep.status}</span>
              <button class="del-btn" onclick="deleteEndpoint('${ep.url.replace(/'/g, "\\'")}','${ep.name.replace(/'/g, "\\'")}')">✕</button>
            </div>
          </div>
          <div class="card-url">${ep.url}</div>
          <div class="card-metrics">
            <div class="metric">
              <div class="metric-label">Latency</div>
              <div class="metric-value ${speedCls}">${msLabel}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Status</div>
              <div class="metric-value">${httpLabel}</div>
            </div>
            <div class="metric">
            <div class="metric-label">Uptime</div>
            <div class="metric-value ${ep.uptime >= 90 ? 'fast' : ep.uptime >= 70 ? 'medium' : 'slow'}">${ep.uptime !== null && ep.uptime !== undefined ? ep.uptime + '%' : '—'}</div>
            </div>
          </div>
          <div class="chart-wrap">
            <canvas id="${canvasId}" height="44"></canvas>
          </div>`;

                    grid.appendChild(card);
                    renderSparkline(canvasId, ep.url, ep.response_time);
                });

            } catch (e) {
                icon.textContent = '↻';
                showToast('// failed to fetch status', 'error');
            }
        }

        document.getElementById('input-url').addEventListener('keydown', e => {
            if (e.key === 'Enter') submitEndpoint();
        });
        document.getElementById('input-name').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('input-url').focus();
        });

        fetchStatus();
        setInterval(fetchStatus, 30000);
    </script>
</body>

</html>
